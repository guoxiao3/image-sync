name: Sync GHCR Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: guoxiao3
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Copy image to my GHCR
        run: |
          skopeo copy --all \
            docker://ghcr.io/uncleluogithub/mous:latest \
            docker://ghcr.io/guoxiao3/mous:latest
